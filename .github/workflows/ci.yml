name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Set compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          else
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          fi

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                   -DRAWSOCK_BUILD_TESTS=ON \
                   -DRAWSOCK_BUILD_EXAMPLES=ON

      - name: Build
        run: |
          cd build
          make -j$(nproc)
          echo "✓ Build completed with ${{ matrix.compiler }} (${{ matrix.build_type }})"

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
          echo "✓ Tests passed"

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
                   --suppress=unusedFunction --suppress=unmatchedSuppression \
                   -I include --error-exitcode=1 --inline-suppr \
                   include/ src/ 2>&1 | tee cppcheck.log || true
          echo "✓ cppcheck completed"

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-logs
          path: |
            cppcheck.log

  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check documentation
        run: |
          # Verify README exists
          test -f README.md || (echo "❌ README.md not found" && exit 1)
          echo "✓ Documentation files present"

      - name: Check project structure
        run: |
          # Verify key files exist
          test -d include/rawsock || (echo "❌ include/rawsock not found" && exit 1)
          test -f include/rawsock/rawsock.hpp || (echo "❌ rawsock.hpp not found" && exit 1)
          test -f include/rawsock/rawsock_c.h || (echo "❌ rawsock_c.h not found" && exit 1)
          test -f CMakeLists.txt || (echo "❌ CMakeLists.txt not found" && exit 1)
          echo "✓ Project structure verified"

      - name: Check examples
        run: |
          test -d examples || (echo "❌ examples not found" && exit 1)
          echo "✓ Examples directory present"