name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        std: [c11, c99, gnu11]
        exclude:
          - os: macos-latest
            compiler: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> $GITHUB_ENV
          else
            echo "CC=gcc" >> $GITHUB_ENV
          fi

      - name: Compile simple test
        run: |
          $CC -std=${{ matrix.std }} -Wall -Wextra -o simple_test examples/simple_test.c
          echo "✓ Simple test compiled successfully"

      - name: Compile offline unit test
        run: |
          $CC -std=${{ matrix.std }} -Wall -Wextra -o offline_unit_test tests/offline_unit_test.c
          echo "✓ Offline unit test compiled successfully"

      - name: Run offline unit test (non-privileged)
        run: |
          ./offline_unit_test
          echo "✓ Offline unit test passed"

      - name: Run simple test (non-privileged)
        run: |
          ./simple_test
          echo "✓ Simple test passed"

      - name: Compile capture example
        run: |
          $CC -std=${{ matrix.std }} -Wall -Wextra -o capture examples/capture.c
          echo "✓ Capture example compiled successfully"

      - name: Check header self-sufficiency
        run: |
          echo '#include "rawsock.h"' > test_include.c
          echo 'int main(void) { return 0; }' >> test_include.c
          $CC -std=${{ matrix.std }} -c test_include.c -o test_include.o
          echo "✓ Header is self-sufficient"

      - name: Test single implementation rule
        run: |
          # Test that implementation can be included in only one translation unit
          echo '#define RAWSOCK_IMPLEMENTATION' > test_impl1.c
          echo '#include "rawsock.h"' >> test_impl1.c
          echo 'void test1(void) { rawsock_has_caps(); }' >> test_impl1.c

          echo '#include "rawsock.h"' > test_impl2.c
          echo 'void test2(void) { rawsock_has_caps(); }' >> test_impl2.c

          echo '#include "rawsock.h"' > test_main.c
          echo 'extern void test1(void); extern void test2(void);' >> test_main.c
          echo 'int main(void) { test1(); test2(); return 0; }' >> test_main.c

          $CC -std=${{ matrix.std }} -c test_impl1.c -o test_impl1.o
          $CC -std=${{ matrix.std }} -c test_impl2.c -o test_impl2.o
          $CC -std=${{ matrix.std }} -c test_main.c -o test_main.o
          $CC test_impl1.o test_impl2.o test_main.o -o test_link
          ./test_link
          echo "✓ Single implementation test passed"

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
                   --error-exitcode=1 --inline-suppr \
                   rawsock.h examples/simple_test.c examples/capture.c tests/offline_unit_test.c 2>&1 | tee cppcheck.log
          echo "✓ cppcheck passed"

      - name: Run clang-tidy
        run: |
          echo '[{' > compile_commands.json
          echo '  "directory": "'"$PWD"'",' >> compile_commands.json
          echo '  "command": "clang -std=c11 -c examples/simple_test.c",' >> compile_commands.json
          echo '  "file": "examples/simple_test.c"' >> compile_commands.json
          echo '}]' >> compile_commands.json

          clang-tidy examples/simple_test.c -- -std=c11 2>&1 | tee clang-tidy.log || true
          echo "✓ clang-tidy completed"

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-logs
          path: |
            cppcheck.log
            clang-tidy.log

  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check documentation
        run: |
          test -f README.md || (echo "❌ README.md not found" && exit 1)
          test -f examples/README.md || (echo "❌ examples/README.md not found" && exit 1)
          echo "✓ Documentation files present"

      - name: Check examples
        run: |
          test -f examples/simple_test.c || (echo "❌ simple_test.c not found" && exit 1)
          test -f examples/capture.c || (echo "❌ capture.c not found" && exit 1)
          echo "✓ Example files present"

      - name: Check tests
        run: |
          test -f tests/offline_unit_test.c || (echo "❌ offline_unit_test.c not found" && exit 1)
          echo "✓ Test files present"

      - name: Verify single header
        run: |
          test -f rawsock.h || (echo "❌ rawsock.h not found" && exit 1)
          size=$(stat -c%s rawsock.h 2>/dev/null || stat -f%z rawsock.h)
          if [ $size -gt 100000 ]; then
            echo "⚠️ Warning: rawsock.h is larger than 100KB ($size bytes)"
          fi
          echo "✓ Single header file verified (size: $size bytes)"
